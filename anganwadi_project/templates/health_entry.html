<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>மாதாந்திர ஆரோக்கிய பதிவு</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-container">
        <h1>⚖️ மாதாந்திர ஆரோக்கிய பதிவு</h1>
        <h3>Monthly Health Record</h3>

        <form action="/add_health_record" method="POST">
            <label>குழந்தையைத் தேர்ந்தெடுக்கவும் (Select Child):</label><br>
            <select name="child_id" required>
                {% for child in children %}
                <option value="{{ child[0] }}">{{ child[1] }}</option>
                {% endfor %}
            </select><br><br>

            <label>மாதம் (Month):</label><br>
            <select name="month" required>
                <option value="January">ஜனவரி</option>
                <option value="February">பிப்ரவரி</option>
                <option value="March">மார்ச்</option>
                <option value="April">ஏப்ரல்</option>
                <option value="May">மே</option>
                <option value="June">ஜூன்</option>
                <option value="July">ஜூலை</option>
                <option value="August">ஆகஸ்ட்</option>
                <option value="September">செப்டம்பர்</option>
                <option value="October">அக்டோபர்</option>
                <option value="November">நவம்பர்</option>
                <option value="December">டிசம்பர்</option>
            </select><br><br>

            <label>வருடம் (Year):</label><br>
            <input type="number" name="year" value="2026" required><br><br>

            <label>எடை - கிலோ (Weight in kg):</label><br>
            <input type="number" step="0.1" name="weight" required><br><br>

            <label>உயரம் - செ.மீ (Height in cm):</label><br>
            <input type="number" step="0.1" name="height" required><br><br>

            <label>நோய் இருந்ததா? (Any illness this month?):</label><br>
            <select name="illness">
                <option value="None">இல்லை (None)</option>
                <option value="Fever">காய்ச்சல் (Fever)</option>
                <option value="Diarrhea">வயிற்றுப்போக்கு (Diarrhea)</option>
                <option value="Cold/Cough">சளி/இருமல் (Cold/Cough)</option>
                <option value="Other">மற்றவை (Other)</option>
            </select><br><br>

            <label>ஊட்டச்சத்து உணவு பெற்றதா? (Got nutrition food?):</label><br>
            <select name="got_nutrition_food" required>
                <option value="Yes">ஆம் (Yes)</option>
                <option value="No">இல்லை (No)</option>
            </select><br><br>

            <button type="submit">சேமிக்க (Save)</button>
        </form>

        <br>
        <a href="/dashboard">⬅ முகப்புப் பக்கம் (Back to Dashboard)</a>
    </div>
</body>
</html>
